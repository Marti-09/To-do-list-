<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Office Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:     #0a0d12;
    --card:   rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.09);
    --accent: #38bdf8;
    --text:   #e8edf2;
    --muted:  rgba(232,237,242,0.45);
    --urgent: #f87171;
    --high:   #fb923c;
    --medium: #facc15;
    --low:    #4ade80;
    --r:      20px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:1920px; height:1080px; overflow:hidden;
    background:var(--bg); color:var(--text);
    font-family:'DM Sans',sans-serif; -webkit-font-smoothing:antialiased;
  }
  body::before {
    content:''; position:fixed; top:-200px; left:-100px;
    width:700px; height:700px;
    background:radial-gradient(circle,rgba(56,189,248,0.07) 0%,transparent 65%);
    pointer-events:none; z-index:0;
  }
  body::after {
    content:''; position:fixed; bottom:-200px; right:-100px;
    width:600px; height:600px;
    background:radial-gradient(circle,rgba(251,146,60,0.05) 0%,transparent 65%);
    pointer-events:none; z-index:0;
  }

  .screen {
    position:relative; z-index:1;
    width:1920px; height:1080px;
    display:grid;
    grid-template-columns:700px 1fr;
  }

  /* LEFT COLUMN */
  .left-col {
    display:flex; flex-direction:column;
    padding:40px 48px 32px;
    border-right:1px solid rgba(255,255,255,0.07);
    overflow:hidden;
  }

  /* RIGHT COLUMN */
  .right-col {
    display:flex; flex-direction:column;
    padding:40px 52px 32px;
    overflow:hidden;
  }

  /* CLOCK */
  .clock-block { margin-bottom:16px; }
  .clock { font-family:'Bebas Neue',sans-serif; font-size:124px; line-height:1; letter-spacing:5px; }
  .date-row { display:flex; align-items:center; gap:12px; margin-top:2px; }
  .day-name  { font-family:'DM Mono',monospace; font-size:18px; color:var(--accent); letter-spacing:4px; text-transform:uppercase; }
  .dot-sep   { color:rgba(255,255,255,0.2); font-size:18px; }
  .full-date { font-family:'DM Mono',monospace; font-size:18px; color:var(--muted); letter-spacing:2px; }

  .rule { height:1px; background:linear-gradient(90deg,var(--accent) 0%,transparent 80%); opacity:0.3; margin-bottom:16px; }

  /* WEATHER */
  .weather-wrap {
    background:var(--card); border:1px solid var(--border); border-radius:var(--r);
    padding:26px 30px 22px; margin-bottom:14px; position:relative; overflow:hidden; flex-shrink:0;
  }
  .weather-wrap::after { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--accent),transparent); }
  .wx-location { font-family:'DM Mono',monospace; font-size:15px; color:var(--accent); letter-spacing:3px; text-transform:uppercase; margin-bottom:10px; }
  .wx-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
  .wx-temp { font-family:'Bebas Neue',sans-serif; font-size:108px; line-height:1; }
  .wx-temp sup { font-size:46px; vertical-align:super; color:var(--muted); }
  .wx-right { text-align:right; }
  .wx-icon  { font-size:76px; line-height:1; margin-bottom:4px; }
  .wx-desc  { font-size:19px; font-weight:300; color:var(--muted); text-transform:capitalize; }
  .wx-pills { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:14px; }
  .wx-pill  { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:10px; padding:11px 14px; }
  .wx-pill-label { font-family:'DM Mono',monospace; font-size:12px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; }
  .wx-pill-val   { font-size:22px; font-weight:500; }

  /* FORECAST */
  .forecast { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; flex-shrink:0; }
  .fc-item  { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:14px 8px; text-align:center; }
  .fc-day   { font-family:'DM Mono',monospace; font-size:13px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; }
  .fc-icon  { font-size:28px; margin-bottom:6px; }
  .fc-hi    { font-size:20px; font-weight:600; }
  .fc-lo    { font-size:15px; color:var(--muted); margin-top:2px; }

  /* TASKS HEADER */
  .tasks-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-shrink:0; }
  .tasks-title  { font-family:'Bebas Neue',sans-serif; font-size:56px; letter-spacing:4px; }
  .tasks-badge  { font-family:'DM Mono',monospace; font-size:17px; color:var(--accent); background:rgba(56,189,248,0.1); border:1px solid rgba(56,189,248,0.25); border-radius:100px; padding:8px 24px; }

  /* COLUMN HEADERS */
  .col-header { display:grid; grid-template-columns:6px 170px 1fr 180px; gap:22px; padding:0 26px 10px; flex-shrink:0; }
  .col-label  { font-family:'DM Mono',monospace; font-size:14px; color:rgba(255,255,255,0.25); letter-spacing:2px; text-transform:uppercase; }

  /* TASK LIST */
  .tasks-list { display:flex; flex-direction:column; gap:11px; overflow-y:auto; flex:1; padding-bottom:36px; }
  .tasks-list::-webkit-scrollbar { width:0; }

  .task-row {
    display:grid; grid-template-columns:6px 170px 1fr 180px;
    align-items:center; gap:22px;
    background:var(--card); border:1px solid var(--border); border-radius:var(--r);
    padding:18px 26px; flex-shrink:0;
    animation:fadeUp 0.3s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  .p-stripe { width:5px; height:40px; border-radius:4px; }
  .stripe-urgent { background:var(--urgent); box-shadow:0 0 8px rgba(248,113,113,0.6); }
  .stripe-high   { background:var(--high);   box-shadow:0 0 8px rgba(251,146,60,0.5); }
  .stripe-medium { background:var(--medium); box-shadow:0 0 8px rgba(250,204,21,0.4); }
  .stripe-low    { background:var(--low);    box-shadow:0 0 8px rgba(74,222,128,0.4); }

  .p-badge { font-family:'DM Mono',monospace; font-size:14px; letter-spacing:1.5px; text-transform:uppercase; padding:7px 16px; border-radius:100px; text-align:center; white-space:nowrap; }
  .badge-urgent { color:var(--urgent); background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.3); }
  .badge-high   { color:var(--high);   background:rgba(251,146,60,0.1);  border:1px solid rgba(251,146,60,0.3); }
  .badge-medium { color:var(--medium); background:rgba(250,204,21,0.1);  border:1px solid rgba(250,204,21,0.3); }
  .badge-low    { color:var(--low);    background:rgba(74,222,128,0.1);  border:1px solid rgba(74,222,128,0.3); }

  /* TASK NAME — 2X bigger than everything else */
  .task-name   { font-size:38px; font-weight:500; line-height:1.2; }
  .task-person { font-family:'DM Mono',monospace; font-size:18px; color:var(--muted); text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  /* STATES */
  .state-box  { text-align:center; padding:40px 24px; background:var(--card); border:1px solid var(--border); border-radius:var(--r); }
  .state-icon { font-size:48px; margin-bottom:12px; }
  .state-text { font-size:22px; font-weight:300; color:var(--muted); }
  .state-err  { font-size:15px; color:var(--urgent); font-family:'DM Mono',monospace; line-height:1.8; }

  /* FOOTER */
  .footer-bar { position:fixed; bottom:0; left:0; right:0; height:34px; background:rgba(10,13,18,0.97); border-top:1px solid rgba(255,255,255,0.07); display:flex; align-items:center; justify-content:space-between; padding:0 52px; z-index:10; }
  .footer-label { font-family:'DM Mono',monospace; font-size:13px; color:rgba(255,255,255,0.2); letter-spacing:2px; }
  .live-dot { width:8px; height:8px; background:var(--low); border-radius:50%; display:inline-block; margin-right:7px; box-shadow:0 0 6px var(--low); animation:blink 2.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Keep-alive pixel — drifts subtly in corner to nudge browser/OS activity */
  .keepalive-pixel {
    position:fixed; bottom:40px; right:8px; width:3px; height:3px;
    border-radius:50%; background:rgba(56,189,248,0.15);
    animation:ka-drift 8s ease-in-out infinite; z-index:5; pointer-events:none;
  }
  @keyframes ka-drift {
    0%   { transform:translate(0px,0px);   opacity:0.15; }
    25%  { transform:translate(-4px,-3px); opacity:0.25; }
    50%  { transform:translate(-2px,-6px); opacity:0.15; }
    75%  { transform:translate(-5px,-2px); opacity:0.2;  }
    100% { transform:translate(0px,0px);   opacity:0.15; }
  }
</style>
</head>
<body>
<div class="screen">

  <!-- LEFT: Clock + Weather -->
  <div class="left-col">
    <div class="clock-block">
      <div class="clock" id="clock">00:00</div>
      <div class="date-row">
        <span class="day-name"  id="day-name">---</span>
        <span class="dot-sep">·</span>
        <span class="full-date" id="full-date">--- --, ----</span>
      </div>
    </div>
    <div class="rule"></div>
    <div class="weather-wrap" id="wx-card">
      <div class="state-box"><div class="state-text">Loading weather…</div></div>
    </div>
    <div class="forecast" id="forecast"></div>
  </div>

  <!-- RIGHT: Tasks -->
  <div class="right-col">
    <div class="tasks-header">
      <div class="tasks-title">TASKS</div>
      <div class="tasks-badge" id="tasks-badge">— open</div>
    </div>
    <div class="col-header">
      <div></div>
      <div class="col-label">Priority</div>
      <div class="col-label">Task</div>
      <div class="col-label">Category</div>
    </div>
    <div class="tasks-list" id="tasks-list">
      <div class="state-box"><div class="state-text">Loading tasks…</div></div>
    </div>
  </div>

</div>

<div class="keepalive-pixel"></div>
<div class="footer-bar">
  <span class="footer-label"><span class="live-dot"></span>LIVE</span>
  <span class="footer-label" id="last-updated">—</span>
  <span class="footer-label">OFFICE DISPLAY · ROSEDALE, NY</span>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG — do not change unless instructed
// ═══════════════════════════════════════════════════════════
const SHEETS_API_KEY  = 'AIzaSyD0xT8Y5gF07t14XS5KOrmR140tIXqHOVE';
const SPREADSHEET_ID  = '10BtYmx-wtCw95YFTRaRkBYiGZRQf7VQoprN4r7tmIa4';
const SHEET_NAME      = 'Sheet1'; // Change if your sheet tab has a different name
const LAT             = 40.6601;
const LON             = -73.7421;
const CITY_NAME       = 'Rosedale, New York';
// ═══════════════════════════════════════════════════════════

// ── KEEP-ALIVE: prevents Silk browser from going idle ─────
// Simulates a tiny invisible interaction every 30 seconds
setInterval(() => {
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;';
  document.body.appendChild(el);
  el.getBoundingClientRect(); // forces a layout reflow — browser sees activity
  document.body.removeChild(el);
}, 30000);

// visibilitychange listener registered after functions are defined (see bottom of script)

// Hard reload every 6 hours to keep memory clean on Fire TV
setTimeout(() => location.reload(), 6 * 60 * 60 * 1000);

// ── CLOCK ─────────────────────────────────────────────────
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function tickClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
  document.getElementById('day-name').textContent  = DAYS[n.getDay()].toUpperCase();
  document.getElementById('full-date').textContent =
    MONTHS[n.getMonth()] + ' ' + n.getDate() + ', ' + n.getFullYear();
}
tickClock();
// Align to the next second boundary so clock never lags
setTimeout(() => { tickClock(); setInterval(tickClock, 1000); }, 1000 - (Date.now() % 1000));

// ── WEATHER: Open-Meteo, no API key needed ────────────────
function decodeWMO(code) {
  const m = {
    0:['Clear Sky','☀️'],1:['Mainly Clear','🌤️'],2:['Partly Cloudy','⛅'],3:['Overcast','☁️'],
    45:['Foggy','🌫️'],48:['Freezing Fog','🌫️'],51:['Light Drizzle','🌦️'],53:['Drizzle','🌦️'],
    55:['Heavy Drizzle','🌧️'],61:['Light Rain','🌧️'],63:['Rain','🌧️'],65:['Heavy Rain','🌧️'],
    71:['Light Snow','❄️'],73:['Snow','❄️'],75:['Heavy Snow','❄️'],77:['Snow Grains','❄️'],
    80:['Light Showers','🌦️'],81:['Showers','🌧️'],82:['Heavy Showers','🌧️'],
    85:['Snow Showers','❄️'],86:['Heavy Snow Showers','❄️'],
    95:['Thunderstorm','⛈️'],96:['Thunderstorm + Hail','⛈️'],99:['Thunderstorm + Hail','⛈️']
  };
  return m[code] || ['Unknown','🌡️'];
}
const FC_DAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

async function checkAlerts() {
  try {
    const res  = await fetch(`https://api.weather.gov/alerts/active?point=${LAT},${LON}`);
    if (!res.ok) return null;
    const data = await res.json();
    const active = (data.features || []).filter(f => f.properties && f.properties.event);
    return active.length ? (active[0].properties.headline || active[0].properties.event) : null;
  } catch(e) { return null; }
}

async function loadWeather() {
  try {
    const [meteoRes, alertText] = await Promise.all([
      fetch('https://api.open-meteo.com/v1/forecast'
        + `?latitude=${LAT}&longitude=${LON}`
        + '&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code'
        + '&daily=weather_code,temperature_2m_max,temperature_2m_min'
        + '&temperature_unit=fahrenheit&wind_speed_unit=mph'
        + '&timezone=America%2FNew_York&forecast_days=6'),
      checkAlerts()
    ]);
    if (!meteoRes.ok) throw new Error('HTTP ' + meteoRes.status);
    const data = await meteoRes.json();
    const cur = data.current, day = data.daily;
    const [desc, icon] = decodeWMO(cur.weather_code);

    const alertHTML = alertText
      ? `<div style="background:rgba(248,113,113,0.12);border:1px solid rgba(248,113,113,0.35);border-radius:10px;padding:10px 16px;margin-bottom:12px;font-family:'DM Mono',monospace;font-size:14px;color:#f87171;letter-spacing:1px;">
           <span style="margin-right:8px;">⚠</span>${alertText}
         </div>`
      : '';

    document.getElementById('wx-card').innerHTML = `
      ${alertHTML}
      <div class="wx-location">📍 ${CITY_NAME}</div>
      <div class="wx-row">
        <div class="wx-temp">${Math.round(cur.temperature_2m)}<sup>°F</sup></div>
        <div class="wx-right">
          <div class="wx-icon">${icon}</div>
          <div class="wx-desc">${desc}</div>
        </div>
      </div>
      <div class="wx-pills">
        <div class="wx-pill"><div class="wx-pill-label">Feels Like</div><div class="wx-pill-val">${Math.round(cur.apparent_temperature)}°F</div></div>
        <div class="wx-pill"><div class="wx-pill-label">Humidity</div><div class="wx-pill-val">${cur.relative_humidity_2m}%</div></div>
        <div class="wx-pill"><div class="wx-pill-label">Wind</div><div class="wx-pill-val">${Math.round(cur.wind_speed_10m)} mph</div></div>
      </div>`;

    const fcHTML = [];
    for (let i = 1; i <= 5; i++) {
      const dow = FC_DAYS[new Date(day.time[i] + 'T12:00:00').getDay()];
      const [, fcIcon] = decodeWMO(day.weather_code[i]);
      fcHTML.push(`<div class="fc-item">
        <div class="fc-day">${dow}</div>
        <div class="fc-icon">${fcIcon}</div>
        <div class="fc-hi">${Math.round(day.temperature_2m_max[i])}°</div>
        <div class="fc-lo">${Math.round(day.temperature_2m_min[i])}°</div>
      </div>`);
    }
    document.getElementById('forecast').innerHTML = fcHTML.join('');
  } catch(e) {
    document.getElementById('wx-card').innerHTML =
      `<div class="state-box"><div class="state-icon">⚠️</div><div class="state-err">Weather unavailable<br><small>${e.message}</small></div></div>`;
    document.getElementById('forecast').innerHTML = '';
    console.error('Weather:', e);
  }
}

// ── TASKS: Google Sheets API — direct, no proxy ───────────
const P_ORDER = { urgent:0, high:1, medium:2, low:3 };
function normP(raw) {
  const p = (raw||'').toLowerCase();
  if (p.includes('urgent')) return 'urgent';
  if (p.includes('high'))   return 'high';
  if (p.includes('medium') || p.includes('med')) return 'medium';
  return 'low';
}

const DONE_VALUES = new Set(['true','done','complete','completed','yes','1','✓','checked']);

async function loadTasks() {
  try {
    // Direct Google Sheets API call — no proxy, no caching issues
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(SHEET_NAME)}?key=${SHEETS_API_KEY}`;
    const res  = await fetch(url);
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'Sheets API error ' + res.status);
    }
    const data   = await res.json();
    const rows   = data.values || [];
    if (rows.length < 2) {
      document.getElementById('tasks-list').innerHTML =
        `<div class="state-box"><div class="state-icon">✅</div><div class="state-text">No tasks found in sheet.</div></div>`;
      document.getElementById('tasks-badge').textContent = '0 open';
      return;
    }

    // First row = headers, lowercase them
    const headers = rows[0].map(h => (h||'').toLowerCase().trim());
    const iStatus   = headers.indexOf('status');
    const iTask     = headers.findIndex(h => h === 'task' || h === 'task name' || h === 'name');
    const iPriority = headers.indexOf('priority');
    const iCategory = headers.findIndex(h => h === 'caligari' || h === 'category' || h === 'assigned to' || h === 'assigned');

    const pending = rows.slice(1)
      .filter(row => {
        const taskName = (row[iTask] || '').trim();
        const status   = (row[iStatus] || '').toLowerCase().trim();
        return taskName !== '' && !DONE_VALUES.has(status);
      })
      .sort((a, b) => {
        const pa = normP(a[iPriority] || '');
        const pb = normP(b[iPriority] || '');
        return (P_ORDER[pa] ?? 9) - (P_ORDER[pb] ?? 9);
      });

    document.getElementById('tasks-badge').textContent = pending.length + ' open';

    if (!pending.length) {
      document.getElementById('tasks-list').innerHTML =
        `<div class="state-box"><div class="state-icon">✅</div><div class="state-text">All done — nothing pending!</div></div>`;
      return;
    }

    document.getElementById('tasks-list').innerHTML = pending.map((row, i) => {
      const p    = normP(row[iPriority] || '');
      const name = row[iTask]     || '—';
      const who  = (iCategory >= 0 ? row[iCategory] : '') || '';
      return `<div class="task-row" style="animation-delay:${i * 0.03}s">
        <div class="p-stripe stripe-${p}"></div>
        <div class="p-badge badge-${p}">${p[0].toUpperCase() + p.slice(1)}</div>
        <div class="task-name">${name}</div>
        <div class="task-person">${who}</div>
      </div>`;
    }).join('');

    const n = new Date();
    document.getElementById('last-updated').textContent =
      'UPDATED ' + String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');

  } catch(e) {
    console.error('Tasks error:', e.message);
    const n = new Date();
    document.getElementById('last-updated').textContent =
      'RETRY ' + String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');

    // Only show error state if tasks list is still in its initial loading state
    const list = document.getElementById('tasks-list');
    if (list.querySelector('.state-text')?.textContent === 'Loading tasks…') {
      const hint = e.message.includes('Unable to parse range')
        ? `Sheet tab name mismatch — current name is "${SHEET_NAME}". Check the tab at the bottom of your Google Sheet.`
        : e.message;
      list.innerHTML = `<div class="state-box">
        <div class="state-icon">⚠️</div>
        <div class="state-text">Could not load tasks</div>
        <div class="state-err">${hint}</div>
      </div>`;
    }
  }
}

// ── INIT + REFRESH ────────────────────────────────────────
loadWeather();
loadTasks();
setInterval(loadWeather, 10 * 60 * 1000); // weather every 10 min
setInterval(loadTasks,       45 * 1000);  // tasks every 45 sec

// Page Visibility: refresh immediately when TV wakes / tab becomes active
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    loadTasks();
    loadWeather();
  }
});
</script>
</body>
</html>
